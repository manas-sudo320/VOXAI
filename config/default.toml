[app]
name = "VoxAI Studio"
environment = "production"
log_level = "INFO"

[logging]
level = "INFO"
directory = "logs"
file_name = "voxai_studio.log"
format = "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
date_format = "%Y-%m-%d %H:%M:%S"
console_enabled = true
file_enabled = true
max_bytes = 1048576
backup_count = 5

[paths]
data_dir = "data"
models_dir = "data/models"
plugins_dir = "data/plugins"
exports_dir = "exports"

[ui]
theme = "system"
language = "en"
remember_window_state = true

[audio]
output_format = "wav"
sample_rate = 22050
volume = 1.0

[tts]
engine = "piper"
default_voice = ""
speaking_rate = 1.0

[translation]
engine = "argos"
default_source_language = "auto"
default_target_language = "en"

[language_detection]
engine = "lingua"
minimum_confidence = 0.2

[plugins]
enabled = true
directories = ["data/plugins"]
manifest_name = "plugin.toml"
disabled = []

[history]
enabled = true
max_items = 500

[database]
url = "sqlite:///voxai_studio.db"
